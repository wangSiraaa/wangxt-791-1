version: '3.8'

services:
  backend:
    build: ./backend
    container_name: wangxt-791-lims-backend
    ports:
      - "17910:3001"
    environment:
      - NODE_ENV=production
      - DB_PATH=./data/lims.db
    volumes:
      - lims-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: wangxt-791-lims-frontend
    ports:
      - "17911:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  lims-data:
    name: wangxt-791-lims-data
